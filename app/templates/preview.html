<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview — PDF Generator</title>
    <style>{{ inline_css | safe }}</style>

    <!-- MathJax for LaTeX rendering -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
            },
            svg: { fontCache: 'global' },
            startup: { typeset: true },
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
<body>

<!-- Top bar — hidden in print/PDF via @media print -->
<div class="preview-bar">
    <h2>Preview</h2>
    <div class="preview-bar-actions">
        <a href="/pdf/download/{{ session_id }}" class="btn">Download PDF</a>
        <button type="button" class="btn" id="drive-upload-btn">Upload to Drive</button>
        <span id="drive-upload-status"></span>
    </div>
</div>

<div class="page-canvas">
    {% for result in results %}
    <section class="page">
        <div class="page-inner">
            <div class="doc-header">
                <div class="doc-header-spacer"></div>
                {% if chapter %}
                <div class="doc-header-chapter">অনুশীলনী-{{ chapter }}</div>
                {% endif %}
                <div class="doc-header-logo">{{ logo_svg | safe }}</div>
            </div>
            <div class="doc-header-rule"></div>
            <div class="doc-header-rule-thin"></div>

            {% if result.has_diagram %}
            <div class="diagram">
                <img src="data:{{ result.image_mime }};base64,{{ result.image_b64 }}" alt="Diagram">
            </div>
            {% endif %}

            <div class="content">{{ result.content }}</div>
        </div>
    </section>
    {% endfor %}
</div>

<script>
    document.getElementById('drive-upload-btn').addEventListener('click', async (e) => {
        const btn = e.currentTarget;
        const status = document.getElementById('drive-upload-status');
        btn.disabled = true;
        btn.textContent = 'Uploading…';
        status.textContent = '';
        try {
            const res = await fetch('/pdf/upload/{{ session_id }}', { method: 'POST' });
            const data = await res.json();
            if (!data.success) throw new Error(data.error || 'Upload failed');
            btn.textContent = 'Uploaded ✓';
            status.innerHTML = `<a href="${data.data.web_view_link}" target="_blank">View in Drive</a>`;
        } catch (err) {
            btn.disabled = false;
            btn.textContent = 'Upload to Drive';
            status.textContent = err.message;
        }
    });
</script>
</body>
</html>
