<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Generator</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="upload-wrapper">
    <div class="upload-card">
        <h1>PDF Generator</h1>
        <p>Upload images containing text, equations, or diagrams.<br>We'll extract the content and build a clean A4 PDF.</p>

        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <form action="/pdf/generate" method="post" enctype="multipart/form-data" id="upload-form">
            <label class="file-input-label" id="file-label">
                <input type="file" name="images" multiple accept="image/*" id="file-input">
                <span id="file-hint">Click to choose images, or drag &amp; drop</span>
            </label>
            <input type="text" name="chapter" id="chapter-input" class="text-input" placeholder="Enter chapter name (e.g. 3.7)" required>
            <select name="provider" id="provider-input" class="text-input">
                <option value="gemini" {% if (selected_provider or "gemini") == "gemini" %}selected{% endif %}>Gemini</option>
                <option value="huggingface" {% if selected_provider == "huggingface" %}selected{% endif %}>Hugging Face</option>
            </select>
            <select name="gemini_model" id="gemini-model-input" class="text-input">
                {% for model_id, label in gemini_models %}
                <option value="{{ model_id }}" {% if model_id == selected_gemini_model %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn" id="submit-btn">Extract &amp; Preview</button>
        </form>
    </div>
</div>

<script>
    const input = document.getElementById('file-input');
    const hint  = document.getElementById('file-hint');
    const btn   = document.getElementById('submit-btn');
    const providerInput   = document.getElementById('provider-input');
    const geminiModelInput = document.getElementById('gemini-model-input');

    input.addEventListener('change', () => {
        const n = input.files.length;
        hint.textContent = n === 0
            ? 'Click to choose images, or drag & drop'
            : `${n} image${n > 1 ? 's' : ''} selected`;
    });

    function syncGeminiModelVisibility() {
        geminiModelInput.style.display = providerInput.value === 'gemini' ? '' : 'none';
    }
    providerInput.addEventListener('change', syncGeminiModelVisibility);
    syncGeminiModelVisibility();

    document.getElementById('upload-form').addEventListener('submit', () => {
        btn.textContent = 'Processing…';
        btn.disabled = true;
    });
</script>
</body>
</html>
